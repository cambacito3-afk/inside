<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>6 Majors</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800&family=Barlow+Condensed:wght@600;700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
</head>
<body class="page-home">

  <nav>
    <a href="index.html" class="nav-logo">6 Majors</a>

    <form class="hero-search" role="search" action="destinations.html" method="get">
      <input
        type="text"
        name="q"
        placeholder="Tokyo, Boston, London..."
        list="races"
        autocomplete="off"
      />
      <datalist id="races">
        <option value="Tokyo"></option>
        <option value="Boston"></option>
        <option value="London"></option>
        <option value="Berlin"></option>
        <option value="Chicago"></option>
        <option value="New York"></option>
      </datalist>
      <button type="submit" class="search-btn">Search</button>
    </form>

    <input type="checkbox" id="nav-toggle" name="nav-toggle" class="nav-toggle-input" />

    <label for="nav-toggle" class="nav-hamburger" aria-label="Open menu" aria-controls="primary-menu">
      <span></span>
      <span></span>
      <span></span>
    </label>

    <ul class="nav-links" id="primary-menu">
      <li><a href="index.html" class="active">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="destinations.html">Destinations</a></li>
      <li><a href="packages.html">Packages</a></li>
      <li><a href="gallery.html">Gallery</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>

    <a href="contact.html" class="nav-cta">Book now</a>
  </nav>

  <header class="hero">
    <div class="muro">
      <img class="muro-image" src="https://images.unsplash.com/photo-1547347298-4074fc3086f0?auto=format&fit=crop&w=1600&q=80" alt="Runners at a major marathon" />
    </div>

    <div class="hero-inner">
      <p class="hero-eyebrow">Run the World</p>
      <h1 class="hero-title">Chase all <em>6 Majors</em></h1>
    </div>
  </header>

  <section class="gold-strip">
    <div class="strip-stat">
      <div class="strip-stat-num">6</div>
      <div class="strip-stat-label">World Majors</div>
    </div>
    <div class="strip-divider"></div>
    <div class="strip-stat">
      <div class="strip-stat-num">7</div>
      <div class="strip-stat-label">Day Support</div>
    </div>
    <div class="strip-divider"></div>
    <div class="strip-stat">
      <div class="strip-stat-num">100%</div>
      <div class="strip-stat-label">Runner Focus</div>
    </div>
  </section>

</body>
</html>
